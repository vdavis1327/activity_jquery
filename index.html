<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>jQuery Activity</title>

   
    <script src="jquery-3.7.1.min.js"></script>

    
    <script>
        if (typeof jQuery == 'undefined') {
            document.write('<script src="https://code.jquery.com/jquery-3.7.1.min.js"><\/script>');
        }
    </script>

   
    <script src="https://cdn.jsdelivr.net/jquery.validation/1.19.5/jquery.validate.min.js"></script>

</head>
<body>

    
    <h1>Common Uses of jQuery</h1>

    
    <p id="summary">
        jQuery is a JavaScript library that simplifies tasks. It allows developers to write
        less code  functionality. jQuery is commonly used to create interactive and dynamic web pages.
    </p>

  
    <p>
        Learn more about the 
        <a href="https://jqueryvalidation.org/">jQuery Validation Plugin</a>
    </p>

   
    <form id="contactForm">
        <label for="name">Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label for="message">Message:</label><br>
        <textarea name="message" required></textarea><br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        $(document).ready(function () {

           
            $("#summary").css("color", "blue");

            $("#contactForm").validate({
                messages: {
                    name: "Please enter your name",
                    email: "Please enter a valid email",
                    message: "Please enter a message"
                }
            });

        });
    </script>

</body>
</html>
